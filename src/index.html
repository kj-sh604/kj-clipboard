    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <title>kj-clipboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kj-sh604/noir.css@latest/out/noir.min.css">
    <style>
        textarea {
            font-family: monospace;
            font-size: 0.95rem;
            padding: 0.75rem;
            resize: vertical;
            box-sizing: border-box;
            tab-size: 4;
        }

        textarea:not([rows]) {
            width: 100%;
            min-height: 30rem;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="password"] {
            font-family: inherit;
            font-size: 0.9rem;
        }

        input[type="password"]:focus {
            outline: none;
        }

        label {
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .result {
            margin-top: 1rem;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 4px;
            display: none;
        }

        .result a {
            word-break: break-all;
        }

        .spacer {
            flex-grow: 1;
        }

        #lang-select {
            display: none;
        }

        .status {
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
